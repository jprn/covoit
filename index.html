<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Ofrance 2026 – Covoiturage Évènement</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />
  <link id="app-styles" rel="stylesheet" href="styles.css?v=20260117-2" />
</head>
<body>
  <div id="app"></div>

  <template id="tpl-layout">
    <header class="topbar">
      <div class="brand">
        <a href="https://www.ofrance2026.fr" target="_blank" rel="noopener noreferrer"><img class="brand-logo" src="assets/Logos/LogoOfrance.png" alt="O'France 2026" /></a>
        <div class="brand-text">
          <div class="brand-title">
            <h1>Covoiturage</h1>
          </div>
        </div>
        <div class="impactbar" aria-label="Impact du covoiturage">
          <div class="impact">
            <div class="impact-value" id="impact-vehicles">0</div>
            <div class="impact-label">Véhicules évités</div>
          </div>
        </div>
        <button id="nav-toggle" class="burger" type="button" aria-label="Menu" aria-expanded="false">☰</button>
      </div>
    </header>
    <nav class="tabbar">
      <a class="tab" data-tab="home" href="#home">Accueil</a>
      <a class="tab" data-tab="event" href="#event">Évènement</a>
      <a class="tab" data-tab="offer" href="#offer">Proposer</a>
      <a class="tab" data-tab="search" href="#search">Rechercher</a>
      <a class="tab" data-tab="help" href="#help">Aide</a>
    </nav>
    <main id="page" class="page"></main>
    <div id="toast" class="toast hidden"></div>
    <button id="back-to-top" class="btn back-to-top hidden" aria-label="Revenir en haut" title="Haut">↑</button>
  </template>

  <template id="tpl-home">
    <section class="hero">
      <h2>Bienvenue</h2>
      <p>Covoiturez pour votre évènement sportif.
      </p>
      <div class="cta-row">
        <a class="btn primary" href="#event">Voir l'évènement</a>
        <a class="btn" href="#offer">Proposer un trajet</a>
      </div>
    </section>
  </template>

  <template id="tpl-event">
    <section>
      <h2>Évènement</h2>
      <div id="ev-event-wrap" class="filters">
        <select id="ev-event" aria-label="Choisir un évènement">
          <option value="">Chargement…</option>
        </select>
      </div>
      <div id="event-card" class="card"></div>
      <div class="cta-row">
        <a class="btn primary block" href="#offer">Proposer un trajet</a>
        <a class="btn block" href="#search">Trouver un trajet</a>
      </div>
      <h3>Trajets à venir</h3>
      <div class="filters">
        <select id="ev-filter-type">
          <option value="any">Tous</option>
          <option value="go">Aller</option>
          <option value="return">Retour</option>
        </select>
        <label><input type="checkbox" id="ev-only-available" /> Places disponibles uniquement</label>
      </div>
      <ul id="ev-rides" class="list"></ul>
      <div id="ev-empty" class="empty hidden">Aucun trajet pour le moment.</div>
    </section>
  </template>

  <template id="tpl-offer">
    <section>
      <h2>Proposer un trajet</h2>
      <form class="form" id="offer-form" novalidate>
        <div class="form-row">
          <label>Évènement
            <select name="event_id" id="offer-event" required>
              <option value="">Chargement…</option>
            </select>
          </label>
          <label>Type
            <select name="ride_type" required>
              <option value="go">Aller</option>
              <option value="return">Retour</option>
            </select>
          </label>
        </div>
        <label>Date et heure de départ
          <input type="datetime-local" name="depart_at" required />
        </label>
        <label>Point de départ
          <input type="text" name="origin" placeholder="Adresse + ville" required />
        </label>
        <label>Places totales
          <input type="number" name="seats" min="1" max="8" required value="3" />
        </label>
        <fieldset>
          <legend>Vos coordonnées</legend>
          <label>Pseudo<input type="text" name="nickname" required /></label>
          <label>Téléphone<input type="tel" name="phone" required /></label>
        </fieldset>
        <div id="offer-error" class="error"></div>
        <button class="btn primary" type="submit">Publier</button>
      </form>
    </section>
  </template>

  <template id="tpl-search">
    <section>
      <h2>Rechercher un trajet</h2>
      <div class="filters sticky">
        <select id="search-type">
          <option value="any">Tous</option>
          <option value="go">Aller</option>
          <option value="return">Retour</option>
        </select>
        <input id="search-city" type="search" placeholder="Ville de départ (contient)" />
        <input id="search-time" type="time" />
        <input id="search-seats" type="number" min="1" max="8" placeholder="Places min" />
        <label><input type="checkbox" id="search-only-available" /> Places dispo uniquement</label>
        <select id="search-sort">
          <option value="earliest">Plus tôt</option>
          <option value="seats">Places</option>
          <option value="cost">Coût</option>
        </select>
        <button type="button" id="search-reset" class="btn">Réinitialiser</button>
      </div>
      <ul id="search-list" class="list"></ul>
      <div id="search-empty" class="empty hidden">Aucun trajet ne correspond. <a href="#offer">Proposer un trajet</a></div>
    </section>
  </template>

  <template id="tpl-ride">
    <section>
      <div id="ride-details" class="card"></div>
      <button id="btn-request" class="btn primary block">Demander à rejoindre</button>
      <div id="req-modal" class="modal hidden">
        <div class="modal-content">
          <button type="button" id="req-x" class="icon-close" aria-label="Fermer">×</button>
          <h3>Demande de place</h3>
          <form id="req-form" class="form">
            <label>Places
              <input type="number" name="seats" min="1" max="8" value="1" required />
            </label>
            <fieldset>
              <legend>Vos coordonnées</legend>
              <label>Nom / Pseudo
                <input type="text" name="passenger_name" placeholder="Votre nom" required />
              </label>
              <label>Téléphone
                <input type="tel" name="passenger_phone" placeholder="06 ..." required />
              </label>
            </fieldset>
            <label>Message
              <textarea name="message" rows="3" placeholder="Votre message"></textarea>
            </label>
            <div class="cta-row">
              <button class="btn" type="button" id="req-cancel">Annuler</button>
              <button class="btn primary" type="submit">Envoyer</button>
            </div>
          </form>
        </div>
      </div>
      <div id="edit-modal" class="modal hidden">
        <div class="modal-content">
          <button type="button" id="edit-x" class="icon-close" aria-label="Fermer">×</button>
          <h3>Modifier le trajet</h3>
          <form id="edit-form" class="form">
            <label>Type
              <select name="ride_type" required>
                <option value="go">Aller</option>
                <option value="return">Retour</option>
              </select>
            </label>
            <label>Date et heure de départ
              <input type="datetime-local" name="depart_at" required />
            </label>
            <label>Point de départ
              <input type="text" name="origin" placeholder="Adresse + ville" required />
            </label>
            <label>Places totales
              <input type="number" name="seats" min="1" max="8" required />
            </label>
            <div class="cta-row">
              <button class="btn" type="button" id="edit-cancel">Annuler</button>
              <button class="btn primary" type="submit">Enregistrer</button>
            </div>
          </form>
        </div>
      </div>
    </section>
  </template>

  <template id="tpl-help">
  <section>
    <h2>Aide</h2>

    <div class="card">
      <h3>Sommaire</h3>
      <ul>
        <li><a href="#help-presentation">Présentation</a></li>
        <li><a href="#help-pratiques">Prérequis et bonnes pratiques</a></li>
        <li><a href="#help-proposer">Proposer un trajet</a></li>
        <li><a href="#help-rechercher">Rechercher et rejoindre un trajet</a></li>
        <li><a href="#help-gerer">Gérer les demandes (conducteur)</a></li>
        <li><a href="#help-telephone">Afficher le téléphone d’un participant</a></li>
        <li><a href="#help-pin">PIN conducteur</a></li>
        <li><a href="#help-rafraichir">Rafraîchir les données</a></li>
        <li><a href="#help-faq">FAQ & Dépannage</a></li>
        <li><a href="#help-confidentialite">Confidentialité</a></li>
        <li><a href="#help-support">Besoin d’aide ?</a></li>
      </ul>
    </div>

    <div class="card">
      <h3 id="help-presentation">Présentation</h3>
      <p>Cette application vous permet de <strong>proposer</strong> ou de <strong>rechercher</strong> des trajets de covoiturage pour un évènement (allers et retours).</p>
      <ul>
        <li><strong>Proposer</strong> un trajet si vous avez des places disponibles.</li>
        <li><strong>Rechercher</strong> un trajet pour rejoindre un conducteur.</li>
        <li><strong>Gérer</strong> les demandes: accepter/refuser et contacter les participants.</li>
      </ul>
    </div>

    <div class="card">
      <h3 id="help-pratiques">Prérequis et bonnes pratiques</h3>
      <ul>
        <li>Renseignez un <strong>numéro de téléphone valide</strong> pour faciliter le contact.</li>
        <li>Gardez vos informations à jour (heure, lieu, places restantes).</li>
      </ul>
    </div>

    <div class="card">
      <h3 id="help-proposer">Proposer un trajet</h3>
      <ol>
        <li>Ouvrez l’onglet « Proposer ».</li>
        <li>Renseignez l’évènement, le type (Aller/Retour), la date/heure et le point de départ.</li>
        <li>Indiquez vos coordonnées (pseudo et téléphone), puis validez.</li>
        <li>Un <strong>PIN conducteur</strong> est associé au trajet: gardez-le, il sera demandé pour modifier/supprimer le trajet et gérer les demandes.</li>
      </ol>
    </div>

    <div class="card">
      <h3 id="help-rechercher">Rechercher et rejoindre un trajet</h3>
      <ol>
        <li>Onglet « Rechercher », appliquez vos filtres (type, ville, heure, places, etc.).</li>
        <li>Ouvrez un trajet pour voir les détails et cliquez « Demander à rejoindre ».</li>
        <li>Indiquez vos coordonnées, le nombre de places et un message si besoin.</li>
      </ol>
    </div>

    <div class="card">
      <h3 id="help-gerer">Gérer les demandes (conducteur)</h3>
      <ul>
        <li>Depuis « Évènement » ou la page du trajet, consultez les demandes.</li>
        <li><strong>Accepter</strong> ou <strong>Refuser</strong> demande le <strong>PIN conducteur</strong>.</li>
        <li>Les <strong>participants acceptés</strong> sont listés séparément.</li>
      </ul>
    </div>

    <div class="card">
      <h3 id="help-telephone">Afficher le téléphone d’un participant</h3>
      <p>Sur un participant accepté, cliquez sur l’icône 📞. Le numéro est <strong>masqué par défaut</strong> et s’affiche après saisie du <strong>PIN du trajet</strong>. Le PIN est demandé à chaque affichage pour des raisons de sécurité.</p>
    </div>

    <div class="card">
      <h3 id="help-pin">PIN conducteur</h3>
      <ul>
        <li>Requis pour: accepter/refuser, modifier/supprimer un trajet, afficher un numéro.</li>
        <li><strong>Non mémorisé</strong> sur l’appareil. En cas d’oubli, contactez le support pour demander une régénération du PIN.</li>
      </ul>
    </div>

    <div class="card">
      <h3 id="help-rafraichir">Rafraîchir les données</h3>
      <p>Dans « Évènement », utilisez « Rafraîchir » pour mettre à jour les listes. Le cache/localStorage peut être vidé afin de garantir des données fraîches.</p>
    </div>

    <div class="card">
      <h3 id="help-faq">FAQ & Dépannage</h3>
      <ul>
        <li><strong>Rien ne s’affiche sur Aide</strong> — Forcez le rechargement (Cmd+Shift+R) et vérifiez l’URL contient #help.</li>
        <li><strong>PIN refusé</strong> — Vérifiez le PIN du bon trajet (exactitude des chiffres).</li>
        <li><strong>Numéro masqué</strong> — Cliquez à nouveau 📞 et ressaisissez le PIN (pas de mémorisation).</li>
        <li><strong>Trajet complet</strong> — Les nouvelles demandes ne sont plus possibles; vous voyez la liste des participants.</li>
      </ul>
    </div>

    <div class="card">
      <h3 id="help-confidentialite">Confidentialité</h3>
      <p>Les numéros de téléphone ne sont visibles que sur action explicite et contrôle PIN. Aucune mémorisation du PIN n’est réalisée côté navigateur.</p>
    </div>

    <div class="card">
      <h3 id="help-support">Besoin d’aide ?</h3>
      <p>Si vous rencontrez un problème, décrivez la page et l’action réalisée (avec l’heure) pour faciliter l’assistance.</p>
      <p><a href="mailto:jerome.perrin_1@icloud.com?subject=Aide%20Covoiturage%20Ofrance">Contacter le support (email)</a></p>
    </div>
  </section>
</template>

  <script src="data.js?v=20260117-4"></script>
  <script type="module" src="app.js?v=20260117-3"></script>
</body>
</html>
